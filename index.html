<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Descargas PS3</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    /* 🔝 TÍTULO PRO */
    .main-title {
      margin-bottom: 20px;
      font-size: 24px;
      max-width: 650px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255,255,255,0.4),
                   0 0 20px rgba(118,75,162,0.6);
    }

    .container {
      background: rgba(0,0,0,0.3);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    /* 📦 SUBTÍTULO PRO */
    .section-title {
      margin-bottom: 25px;
      font-size: 20px;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #ffffff, #ddddff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 8px rgba(255,255,255,0.2);
    }

    /* 🔘 BOTONES */
    .btn {
      display: block;
      width: 260px;
      margin: 12px auto;
      padding: 15px;
      font-size: 18px;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.3s;
    }

    /* 🟢 BOTÓN PRINCIPAL */
    .btn-main {
      background: #28a745;
      box-shadow: 0 0 10px rgba(40,167,69,0.5);
    }

    .btn-main:hover {
      background: #34d058;
      transform: scale(1.05);
    }

    /* 🔴 BOTÓN SECUNDARIO */
    .btn-secondary {
      background: #ff4b2b;
    }

    .btn-secondary:hover {
      background: #ff416c;
      transform: scale(1.05);
    }

    /* 🏷️ BADGE */
    .badge {
      display: inline-block;
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 3px 8px;
      border-radius: 8px;
      margin-left: 8px;
    }

    /* 🖼️ LOGO */
    .mini-img {
      margin-top: 18px;
      width: 140px;
      opacity: 0.95;
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
      transition: 0.3s;
    }

    .mini-img:hover {
      transform: scale(1.05);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }

    /* 📝 FOOTER */
    .footer {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 14px;
      opacity: 0.9;
      max-width: 600px;
      border-top: 1px solid rgba(255,255,255,0.3);
      padding-top: 15px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <h1 class="main-title">
    🔑 ACTUALIZA PS3 HEN 4.93 OFICIAL SIN USB 🔓
  </h1>

  <div class="container">
    <h2 class="section-title">📦 Recursos ⬇️</h2>

    <a class="btn btn-main" href="https://www.mediafire.com/file/p2odnur8xnm3pne/HEN_493_OFICIAL_SIN_USB.pkg/file" target="_blank">
      🌟 HFW 4.93 <span class="badge">OFICIAL</span>
    </a>

    <a class="btn btn-secondary" href="https://www.mediafire.com/file/bpd3bemho00ggcf/FIX_HEN_4.93_OFICIAL_Videogamez.pkg/file" target="_blank">
      🔓 FIX TIENDAS
    </a>

    <!-- 🖼️ TU LOGO -->
    <img src="killersopla.png" alt="Killersopla" class="mini-img">

  </div>

  <div class="footer">
    ⚡Sitio creado por Killersopla con cariño para ustedes 🚨<br>
    Créditos a todos los que trabajan para que esto sea posible,<br>
    al equipo de PS3XPLOIT, a los colaboradores de PSXPLACE<br>
    y a cada uno de los colegas 🚨
  </div>

</body>
</html>
